<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반 에른하임's Phone</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 기본 설정 및 프레임 ===== */
        body { margin: 0; padding: 0; background-color: #333; font-family: 'Noto Sans KR', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .phone { aspect-ratio: 390 / 844; max-width: 90vw; max-height: 90vh; width: 390px; height: 844px; border: 12px solid black; border-radius: 50px; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; }
        .screen { width: 100%; height: 100%; position: relative; overflow: hidden; background-color: #ffffff; border-radius: 38px; }

        /* ===== 페이지 전환 및 레이아웃 ===== */
        .page { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background-color: #ffffff; display: flex; flex-direction: column; transition: opacity 0.2s ease-in-out; visibility: hidden; opacity: 0; z-index: 1; color: #000000; }
        .page.active { visibility: visible; opacity: 1; z-index: 10; }

        /* ===== 공통 UI 요소 ===== */
        .status-bar { text-align: right; padding: 18px 25px 10px 25px; font-size: 14px; font-weight: 700; flex-shrink: 0; color: #000000; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; }
        .status-bar.dark-mode { color: #ffffff; background: rgba(0, 0, 0, 0.3); }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; font-weight: 700; font-size: 1.1em; }
        .app-header .back-btn { cursor: pointer; font-size: 1.2em; }
        .content-body { flex-grow: 1; overflow-y: auto; }
        .home-indicator-container { padding: 20px 0 10px 0; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .home-indicator { width: 134px; height: 5px; background-color: #000000; border-radius: 100px; cursor: pointer; }
        
        /* ===== 홈 화면 ===== */
        .home-screen { background-size: cover; background-position: center; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; flex-grow: 1; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon img { width: 60px; height: 60px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-icon span { font-size: 12px; color: white; margin-top: 5px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* ===== 앱별/요소별 커스텀 스타일 ===== */
        .image-placeholder { background-color: #ccc; display: flex; justify-content: center; align-items: center; color: #666; font-size: 12px; text-align: center; padding: 10px; box-sizing: border-box; word-break: keep-all; line-height: 1.3; }
        .photo-item { aspect-ratio: 1 / 1; }

        .chat-body { display: flex; flex-direction: column; padding: 20px; }
        .message-bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; line-height: 1.4; }
        .message-bubble.sent { background-color: #3478F6; color: white; align-self: flex-end; }
        .message-bubble.received { background-color: #E5E5EA; color: #000000; align-self: flex-start; }
        
        .list-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .list-item:hover { background-color: #f9f9f9; }
        .list-item-title { font-weight: bold; }
        .list-item-preview { font-size: 0.9em; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .call-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .call-info { flex-grow: 1; }
        .call-name { font-weight: bold; }
        .call-type { font-size: 0.8em; color: #888; }
        .call-duration { font-size: 0.9em; color: #555; }
        .call-item.missed .call-name { color: #E74C3C; }

        .alarm-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .alarm-time { font-size: 1.8em; }
        .alarm-label { font-size: 0.9em; }
        .alarm-item.disabled .alarm-time, .alarm-item.disabled .alarm-label { color: #aaa; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; text-align: center; }
        .calendar-header { font-weight: bold; color: #888; padding-bottom: 10px; font-size: 0.9em; }
        .calendar-day { padding: 10px 0; position: relative; }
        .calendar-day.event::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background-color: #3478F6; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); }
        
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; }
        .photo-item { width: 100%; height: 100%; object-fit: cover; }
        
        .section-title { padding: 15px 20px 5px; font-size: 1.2em; font-weight: bold; background-color: #f7f7f7; border-bottom: 1px solid #e0e0e0; }
        
        .note-content, .diary-content { padding: 20px; white-space: pre-wrap; line-height: 1.6; }
        
        .music-track { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .music-info { flex-grow: 1; }
        .music-title { font-weight: bold; }
        .music-artist { font-size: 0.9em; color: #666; }

        .youtube-item, .amazon-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 10px; }
        .youtube-thumbnail { width: 120px; height: 68px; flex-shrink: 0; }
        .youtube-info .title { font-weight: bold; font-size: 0.9em; margin-bottom: 4px; }
        .youtube-info .channel { font-size: 0.8em; color: #666; }
        .amazon-item .item-name { font-weight: bold; }
        .amazon-item .item-details { font-size: 0.8em; color: #555; margin-top: 5px; }

        .diary-entry { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .diary-date { font-weight: bold; margin-bottom: 5px; color: #555; }
        .diary-preview { color: #333; line-height: 1.5; }

        .custom-app-content { padding: 20px; }
        .custom-app-content h3 { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0;}
        .custom-app-content ul { list-style: none; padding: 0; }
        .custom-app-content li { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 8px; }

        .meta-message-container { position: absolute; top: 60px; left: 20px; right: 20px; padding: 12px 15px; background-color: rgba(0, 0, 0, 0.75); color: white; border-radius: 12px; text-align: center; font-size: 15px; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.5s ease-in-out; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .meta-message-container.visible { opacity: 1; visibility: visible; }
    </style>
</head>

    document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');

    document.getElementById(pageId).classList.add('active');
}

function renderCallHistory() {
    const list = document.getElementById('call-history-list');
    list.innerHTML = phoneData.callHistory.map(call => `
        <div class="call-item ${call.type === '부재중 전화' ? 'missed' : ''}">
            <div class="call-info">
                <div class="call-name">${call.name}</div>
                <div class="call-type">${call.type}</div>
            </div>
            <div class="call-duration">${call.duration}</div>
        </div>
    `).join('');
}

function renderAlarms() {
    const list = document.getElementById('alarms-list');
    list.innerHTML = phoneData.alarms.map(alarm => `
        <div class="alarm-item ${!alarm.enabled ? 'disabled' : ''}">
            <div>
                <div class="alarm-time">${alarm.time}</div>
                <div class="alarm-label">${alarm.label}</div>
            </div>
            <span>${alarm.enabled ? '켜짐' : '꺼짐'}</span>
        </div>
    `).join('');
}

function renderCalendar() {
    const header = document.getElementById('calendar-header');
    header.textContent = `${phoneData.calendar.year}년 ${phoneData.calendar.month}`;
    const body = document.getElementById('calendar-body');
    const daysInMonth = 30; // 6월
    const startDay = 6; // 2065년 6월 1일은 토요일
    let html = '<div class="calendar-grid">';
    '일월화수목금토'.split('').forEach(day => html += `<div class="calendar-header">${day}</div>`);
    for (let i = 0; i < startDay; i++) {
        html += '<div></div>';
    }
    for (let i = 1; i <= daysInMonth; i++) {
        const event = phoneData.calendar.events.find(e => e.date === i);
        html += `<div class="calendar-day ${event ? 'event' : ''}">${i}</div>`;
    }
    html += '</div>';
    body.innerHTML = html;
}

    document.getElementById('message-sender-name').textContent = msg.sender;
    const body = document.getElementById('message-conversation-body');
    body.innerHTML = msg.conversation.map(conv => `
        <div class="message-bubble ${conv.type}">${conv.text}</div>
    `).join('');
    showPage('message-detail');
}

}

// ===== Meta Message Logic =====
function showMetaMessages() {
    const container = document.getElementById('meta-message');
    let currentIndex = 0;
    
    function showNextMessage() {
        if (currentIndex < phoneData.metaMessages.length) {
            container.textContent = phoneData.metaMessages[currentIndex];
            container.classList.add('visible');
            
            setTimeout(() => {
                container.classList.remove('visible');
                currentIndex++;
                setTimeout(showNextMessage, 3000);
            }, 3000);
        }
    }
    
    setTimeout(showNextMessage, 30000);
}

});
