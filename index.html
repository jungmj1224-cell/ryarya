<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>CRACK ARCHIVE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #111214;
      --panel: #16181d;
      --panel-soft: #1c1f26;
      --accent: #4f7cff;
      --accent-soft: rgba(79,124,255,0.15);
      --text: #eaeaf0;
      --muted: #9aa0b4;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", "Noto Sans KR", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* 🔹 전체 배경 그라데이션 (좌우 안 잘림) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(235,235,235,0.18) 0%,
        rgba(235,235,235,0.08) 30%,
        rgba(235,235,235,0.0) 60%
      );
      z-index: 0;
      pointer-events: none;
    }

    /* Sidebar */
    aside {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 1;
    }

    .site-title {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 18px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      text-align: left;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .nav button:hover {
      background: var(--panel-soft);
      border-color: var(--border);
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 56px;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      letter-spacing: 0.14em;
      background: var(--panel);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      color: var(--accent);
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* Home */
    .home {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .crack-title {
      text-align: center;
    }

    .crack-title h1 {
      margin: 0;
      font-size: 64px;
      letter-spacing: 0.22em;
      font-weight: 700;
    }

    .crack-title .c { color: var(--accent); }
    .crack-title .w { color: var(--text); }

    .crack-line {
      margin: 18px auto 0;
      width: 260px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* World view */
    .world-view {
      display: none;
      width: 100%;
      max-width: 1000px;
    }

    .world-box {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      background: var(--panel);
    }

    .world-view h2 {
      font-size: 28px;
      margin-bottom: 24px;
      letter-spacing: 0.12em;
    }

    .subgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .sub {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      background: var(--panel);
    }

    .sub h3 {
      margin-top: 0;
      font-size: 15px;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .sub ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .sub a {
      display: block;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      text-align: center;
    }

    .sub a:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
/* 📱 모바일 최적화 레이아웃 */
    @media (max-width: 768px) {
body { 
        flex-direction: column; 
        overflow-y: auto; /* 🚨 이 줄을 추가하면 스크롤이 살아납니다! */
        height: auto;
      }

        aside { 
        width: 100%; 
        height: auto; 
        border-right: none; 
        border-bottom: 1px solid var(--border); 
        padding: 15px; 
        flex-shrink: 0; 
        position: relative; /* 위치 고정 해제 */
      }

      .nav { 
        flex-direction: row; /* 메뉴를 가로로 나열 */
        overflow-x: auto;   /* 메뉴가 많으면 옆으로 밀어서 보게 설정 */
        padding-bottom: 5px; 
        gap: 10px; 
        -webkit-overflow-scrolling: touch;
      }

      .nav button { 
        white-space: nowrap; /* 글자 줄바꿈 방지 */
        padding: 10px 18px; 
        flex-shrink: 0; 
        background: var(--panel-soft); 
        font-size: 13px;
      }

      header { 
        position: relative;
        width: 100%;
        height: 56px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        color: var(--accent);
      }

        main {
        margin-top: 0;
        display: block;
        overflow: visible;
      }

      .home { 
        margin-top: 150px; /* 기존보다 더 과감하게 위로 올림 */
      }

      .content { 
        align-items: center; 
        padding: 0 20px;
        min-height: 40vh; /* 로고가 차지하는 세로 영역 조절 */
      }

      .crack-title h1 { 
        font-size: clamp(26px, 9vw, 36px); 
      }

      .subgrid {
        grid-template-columns: 1fr; 
      }
/* 1️⃣ 상세 페이지가 나타나는 컨텐츠 영역의 여백 최소화 */
      .content { 
        padding: 10px 20px; /* 상하 여백을 10px로 확 줄임 */
        align-items: flex-start; /* 중앙 정렬 대신 위에서부터 시작하게 함 */
      }

      /* 2️⃣ 월드 상세 박스 위치 조정 */
      .world-view {
        margin-top: 0; /* 헤더와의 간격 제거 */
      }

      .world-box {
        padding: 20px;   /* 내부 여백을 줄여서 한 화면에 더 많이 보이게 함 */
        margin-top: 5px; /* 헤더 줄(CRACK ARCHIVE)과 아주 약간의 간격만 둠 */
      }

      .world-box h2 {
        font-size: 22px;
        margin-top: 0;   /* 제목 위쪽 여백 제거 */
        margin-bottom: 20px;
      }
      }
    }
  </style>
</head>
<body>

  <aside>
    <div class="site-title">WORLD</div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main>
    <header>CRACK ARCHIVE</header>

    <section class="content">
      <div class="home" id="home">
        <div class="crack-title">
          <h1><span class="c">C</span>RACK AR<span class="c">C</span>HIVE</h1>
          <div class="crack-line"></div>
        </div>
      </div>

      <div class="world-view" id="worldView"></div>
    </section>
  </main>

  <script>
   const worlds = [
      "도재언","마키나 게임","애완 인간","황궁의 꽃","성대한 집착","머메이드",
      "환계 이동기","하이틴 에이지","구룡성채","수인 쉐어하우스",
      "남고 생활기","중세 11년","ETC"
    ];

    const nav = document.getElementById('nav');
    const home = document.getElementById('home');
    const view = document.getElementById('worldView');

    worlds.forEach(name => {
      const btn = document.createElement('button');
      btn.textContent = name;
      btn.onclick = () => openWorld(name);
      nav.appendChild(btn);
    });

    function openWorld(name) {
      home.style.display = 'none';
      view.style.display = 'block';

      let storyItems = '<li><a href="#">페이지 추가 예정</a></li>';
      let burnerItems = '<li><a href="#">페이지 추가 예정</a></li>';

      if (name === '하이틴 에이지') {
        storyItems = `<li><a href="하이틴 에이지_bookmarks-darkmode.html">메인 루트</a></li>`;
        burnerItems = `
          <li><a href="니콜 카톡-me.html">니콜 카톡</a></li>
          <li><a href="니콜 인스타(업글버전).html">니콜 인스타</a></li>
          <li><a href="하이틴 다인 당근마켓.html">당근마켓</a></li>
          <li><a href="하이틴 낙서장.html">낙서장</a></li>
          <li><a href="앤디 당근마켓.html">앤디 당근마켓</a></li>
          <li><a href="레이먼 나무위키.html">레이먼 나무위키</a></li>
        `;
      } else if (name === '성대한 집착') {
        storyItems = `
          <li><a href="성대한 집착_bookmarks-darkmode.html">메인 2</a></li>
          <li><a href="성대한집착1_fixed.html">메인 3</a></li>
        `;
        burnerItems = `
          <li><a href="제이드 폰.html">제이드 폰</a></li>
          <li><a href="오웬 휴대폰.html">오웬 폰</a></li>
          <li><a href="제이드 카톡.html">제이드 카톡</a></li>
          <li><a href="제이드 썸원.html">제이드 썸원</a></li>
          <li><a href="제이드 당근마켓.html">제이드 당근마켓</a></li>
        `;
      } else if (name === '황궁의 꽃') {
        storyItems = `
          <li><a href="황궁의 꽃 1.html">메인 1</a></li>
          <li><a href="황궁의 꽃 2.html">메인 2</a></li>
          <li><a href="황궁의 꽃 2.html">메인 3</a></li>
        `; // 👈 이 닫는 기호들이 빠져 있었습니다.
        burnerItems = `
          <li><a href="리브론 커플 데이트 체크리스트.html">커플 데이트 체크리스트</a></li>
          <li><a href="리브론 커플 tmi 체크리스트.html">커플 tmi 체크리스트</a></li>
          <li><a href="리브론 커플 19 체크리스트.html">커플 19 체크리스트</a></li>
          <li><a href="리브론 연인간 짜증나는 상황 월드컵.html">연인간 짜증나는 상황 월드컵</a></li>
          <li><a href="리브론 스팀페이지.html">스팀페이지</a></li>
          <li><a href="리브론 다마고치.html">리브론 다마고치</a></li>
        `;
      } else if (name === '환계 이동기') {
        burnerItems = `
          <li><a href="류월 휴대폰.html">류월 폰</a></li>
        `;
      } else if (name === '머메이드') {
        burnerItems = `
          <li><a href="기도현 휴대폰.html">기도현 폰</a></li>
        `;
      } else if (name === '구룡성채') {
        storyItems = `
          <li><a href="구룡성채 로렌조노아루트.html" target="_blank">로렌조,노아 루트</a></li>
          <li><a href="구룡성채-아이작 회귀.html" target="_blank">아이작 회귀</a></li>
          <li><a href="구룡성채_리처드루트.html" target="_blank">리처드 루트</a></li>
        `;
        burnerItems = `
          <li><a href="아이작 휴대폰.html">아이작 폰</a></li>
          <li><a href="아이작 회귀 썸원.html">아이작 회귀 썸원</a></li>
          <li><a href="아이작 회귀 스팀페이지.html">아이작 회귀 스팀페이지</a></li>
          <li><a href="아이작 커플데이트 체크리스트.html">아이작 커플데이트</a></li>
          <li><a href="아이작 커플 tmi.html">아이작 커플 tmi</a></li>

          <li><a href="아이작 썸원.html">아이작 썸원</a></li>
          <li><a href="아이작 스팀페이지.html">아이작 스팀페이지</a></li>
          <li><a href="요한 휴대폰.html">요한 폰</a></li>
          <li><a href="요한 넷플릭스.html">요한 넷플</a></li>
        `;
      } else if (name === '수인 쉐어하우스') {
        storyItems = `
          <li><a href="수인 웨어하우스 02-20.html">도윤서 루트</a></li>
        `; // 👈 닫는 기호 추가
        burnerItems = `
          <li><a href="백호현 휴대폰.html">백호현 폰</a></li>
          <li><a href="도윤서 휴대폰.html">도윤서 폰</a></li>
          <li><a href="도윤서 카톡.html">도윤서 카톡</a></li>
          <li><a href="도윤서 에타.html">도윤서 에타</a></li>
        `;
      } else if (name === '애완 인간') {
        storyItems = `
          <li><a href="애완인간 02-20.html">메인</a></li>
        `;
        burnerItems = `
          <li><a href="반_폰.html">반 휴대폰</a></li>
          <li><a href="스팀페이지_반.html">스팀페이지</a></li>
          <li><a href="반 유저도감2.html">유저도감</a></li>
        `;
      } else if (name === '도재언') {
        storyItems = `
          <li><a href="도재언 02-20.html">메인</a></li>
        `;
        burnerItems = `
          <li><a href="도재언(맞선) 커플 유튜브채널.html">커플 유튜브 채널(맞선)</a></li>
          <li><a href="도재언 커플체크리스트.html">커플 체크리스트(맞선)</a></li>
          <li><a href="도재언 넷플릭스.html">넷플릭스(맞선)</a></li>
          <li><a href="도재언 유저도감.html">유저도감 1(맞선)</a></li>
          <li><a href="도재언 유저도감2.html">유저도감 2(맞선)</a></li>
        `;
      } else if (name === '마키나 게임') {
        storyItems = `
          <li><a href="마키나 게임 02-20.html">메인</a></li>
        `;
        burnerItems = `
          <li><a href="마키나 유저도감.html">유저도감</a></li>
        `;
      } else if (name === 'ETC') {
        storyItems = `
          <li><a href="잊고 잃어버린 신님 02-20.html">잊고 잃어버린 신님</a></li>
          <li><a href="내 혈육의 친구.html">내 혈육의 친구</a></li>
          <li><a href="머메이드 02-20.html">머메이드</a></li>
        `; // 👈 닫는 기호 추가
        burnerItems = `
        `;
      }

      view.innerHTML = `
        <div class="world-box">
          <h2>${name}</h2>
          <div class="subgrid">
            <div class="sub">
              <h3>STORY</h3>
              <ul>${storyItems}</ul>
            </div>
            <div class="sub">
              <h3>BURNER</h3>
              <ul>${burnerItems}</ul>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
