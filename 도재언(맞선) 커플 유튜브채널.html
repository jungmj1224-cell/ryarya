<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        :root {
            --yt-background: #0f0f0f;
            --yt-surface: #1f1f1f;
            --yt-surface-hover: #3f3f3f;
            --yt-primary-text: #f1f1f1;
            --yt-secondary-text: #aaa;
            --yt-border-color: #303030;
            --yt-button-color: #3ea6ff;
            --yt-subscribe-button: #c00;
            --yt-subscribed-button: #5c5c5c;
        }

        body {
            font-family: 'Roboto', 'Noto Sans KR', sans-serif;
            background-color: var(--yt-background);
            color: var(--yt-primary-text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .youtube-container {
            width: 100%;
            max-width: 1280px;
            display: flex;
            background-color: var(--yt-background);
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            padding: 20px 10px;
            border-right: 1px solid var(--yt-border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sidebar-logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--yt-primary-text);
            margin-bottom: 30px;
        }
        .sidebar-logo span { color: var(--yt-subscribe-button); }

        .sidebar-menu {
            width: 100%;
        }
        .sidebar-item {
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .sidebar-item:hover {
            background-color: var(--yt-surface);
        }
        
        .main-content {
            flex-grow: 1;
            height: 100vh;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--yt-border-color);
        }

        .search-bar {
            flex-grow: 1;
            max-width: 600px;
            display: flex;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 15px;
            background-color: #121212;
            border: 1px solid var(--yt-border-color);
            border-radius: 40px 0 0 40px;
            color: var(--yt-primary-text);
            font-size: 16px;
        }
        .search-bar button {
            padding: 0 25px;
            background-color: var(--yt-surface);
            border: 1px solid var(--yt-border-color);
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
        }
        
        .user-profile {
            width: 32px;
            height: 32px;
            background-color: var(--yt-button-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 메인 채널 페이지 */
        .channel-header {
            width: 100%;
        }

        .channel-banner {
            width: 100%;
            height: 180px;
            background-color: var(--yt-surface);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: var(--yt-secondary-text);
            margin-bottom: 20px;
        }

        .channel-info {
            display: flex;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 20px;
        }
        
        .channel-profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--yt-surface);
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .channel-meta {
            display: flex;
            flex-direction: column;
        }

        .channel-name {
            font-size: 24px;
            font-weight: bold;
        }

        .channel-stats {
            font-size: 14px;
            color: var(--yt-secondary-text);
        }

        .video-list-container {
            height: calc(100vh - 430px);
            overflow-y: scroll;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .video-card {
            cursor: pointer;
        }

        .thumbnail {
            width: 100%;
            height: 160px;
            background-color: var(--yt-surface);
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            padding: 10px;
            color: var(--yt-secondary-text);
            box-sizing: border-box;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 12px;
            color: var(--yt-secondary-text);
        }

        /* 영상 상세 페이지 */
        #video-detail-page {
            display: flex;
            gap: 20px;
        }
        .video-main {
            flex: 2;
        }
        .related-videos {
            flex: 1;
        }

        .video-player {
            width: 100%;
            height: 480px;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .video-scene-description {
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 16px;
            z-index: 1;
        }

        .video-progress-bar-container {
            position: absolute;
            bottom: 10px;
            width: 95%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .video-progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--yt-subscribe-button);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .video-info-bar {
            padding: 15px 0;
        }
        .video-detail-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .actions-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .video-channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-channel-info .channel-profile-pic {
            width: 40px;
            height: 40px;
            font-size: 20px;
            margin: 0;
            cursor: pointer;
        }
        .video-channel-info .channel-name {
            font-size: 16px;
        }
        #subscribe-btn {
            background-color: var(--yt-primary-text);
            color: var(--yt-background);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        #subscribe-btn.subscribed {
             background-color: var(--yt-subscribed-button);
             color: var(--yt-primary-text);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-buttons button {
            background-color: var(--yt-surface);
            color: var(--yt-primary-text);
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 500;
        }
        .action-buttons button:hover {
            background-color: var(--yt-surface-hover);
        }

        .video-description {
            background-color: var(--yt-surface);
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-top: 15px;
        }
        .video-description .hashtags {
            color: var(--yt-button-color);
            margin-top: 10px;
        }

        .comment-section {
            margin-top: 20px;
        }
        
        .comment-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .comment-input-area .user-profile {
            flex-shrink: 0;
        }
        .comment-input-area input {
            flex-grow: 1;
            background: none;
            border: none;
            border-bottom: 1px solid var(--yt-border-color);
            color: var(--yt-primary-text);
            font-size: 14px;
        }
        .comment-input-area input:focus {
            outline: none;
            border-bottom: 1px solid var(--yt-primary-text);
        }
        .comment-input-area button {
            background-color: var(--yt-button-color);
            border: none;
            color: var(--yt-background);
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .comment {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .comment .user-profile {
            width: 40px;
            height: 40px;
        }
        .comment-content .username {
            font-weight: bold;
            margin-right: 8px;
        }
        .comment-content .timestamp {
            color: var(--yt-secondary-text);
            font-size: 12px;
        }
        .comment-text {
            margin-top: 4px;
        }
        .comment-reply {
            margin-left: 55px;
        }
        .owner-reply .comment-content {
            background-color: var(--yt-surface);
            padding: 10px;
            border-radius: 8px;
        }

        .related-videos .video-card {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .related-videos .thumbnail {
            width: 160px;
            height: 90px;
            flex-shrink: 0;
            margin: 0;
        }
        .related-videos .video-info {
            flex-grow: 1;
        }
        .related-videos .video-title {
            font-size: 14px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

    const mainPage = document.getElementById('channel-main-page');
    const detailPage = document.getElementById('video-detail-page');
    const videoListMain = document.getElementById('video-list-main');

    let likeCount = 0;
    let isSubscribed = false;
    let currentVideoId = null;
    let progressInterval = null;

    function goToVideo(id) {
        mainPage.classList.add('hidden');
        detailPage.classList.remove('hidden');
        history.pushState(null, '', `?v=${id}`);
        loadVideoContent(id);
    }

    function goToChannel() {
        detailPage.classList.add('hidden');
        mainPage.classList.remove('hidden');
        history.pushState(null, '', window.location.pathname);
        if(progressInterval) clearInterval(progressInterval);
    }

    function loadVideoList() {
        videoListMain.innerHTML = '';
        Object.values(videoData).forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => goToVideo(video.id);
            card.innerHTML = `
                <div class="thumbnail">${video.thumbnail}</div>
                <div class="video-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">조회수 ${video.views}회 ‧ ${video.uploadDate}</div>
                </div>
            `;
            videoListMain.appendChild(card);
        });
    }

    function loadVideoContent(id) {
        currentVideoId = id;
        const video = videoData[id];
        if (!video) {
            goToChannel();
            return;
        }

        likeCount = video.likes;
        document.getElementById('video-detail-title').textContent = video.title;
        document.getElementById('like-count').textContent = likeCount.toLocaleString();
        document.getElementById('video-detail-description').textContent = video.description;
        document.getElementById('video-detail-hashtags').textContent = video.hashtags;

        const commentList = document.getElementById('comment-list');
        commentList.innerHTML = '';
        let totalComments = video.comments.length;
        video.comments.forEach(commentData => {
            const comment = createCommentElement(commentData);
            commentList.appendChild(comment);
            if (commentData.reply) totalComments++;
        });
        document.getElementById('comment-count-header').textContent = `댓글 ${totalComments}개`;

        const relatedList = document.getElementById('related-videos-list');
        relatedList.innerHTML = '';
        video.related.forEach(relatedVideo => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumbnail">${relatedVideo.thumb}</div>
                <div class="video-info">
                    <div class="video-title">${relatedVideo.title}</div>
                    <div class="video-meta">${relatedVideo.channel}</div>
                </div>
            `;
            relatedList.appendChild(card);
        });
        
        // 비디오 재생 시뮬레이션
        const progressBar = document.getElementById('video-progress-bar');
        const sceneDesc = document.querySelector('.video-scene-description');
        let sceneIndex = 0;

        if(progressInterval) clearInterval(progressInterval);
        
        progressBar.style.transition = 'none';
        progressBar.style.width = '0%';
        sceneDesc.textContent = video.scenes[0].desc;

        setTimeout(() => {
            progressBar.style.transition = 'width 1s linear';
            progressInterval = setInterval(() => {
                const currentProgress = parseFloat(progressBar.style.width) || 0;
                const newProgress = currentProgress + (100 / video.scenes.length);
                progressBar.style.width = `${Math.min(newProgress, 100)}%`;

                sceneIndex++;
                if (sceneIndex < video.scenes.length) {
                    sceneDesc.textContent = video.scenes[sceneIndex].desc;
                }
                
                if (newProgress >= 100) {
                    clearInterval(progressInterval);
                }
            }, 5000); // 5초마다 장면 전환
        }, 100);

        // 좋아요/구독 상태 초기화
        document.getElementById('like-btn').style.backgroundColor = '';
    }

    function createCommentElement(commentData) {
        const commentDiv = document.createElement('div');
        commentDiv.className = 'comment';
        
        let profileInitial = commentData.profile;
        if (commentData.isOwner) {
            if(commentData.user === "HJ_Cotton") profileInitial = '🤍';
            else if(commentData.user === "Do_JaeEon") profileInitial = '🖤';
        } else if (commentData.user === "한우정") {
            profileInitial = '우';
        }

        commentDiv.innerHTML = `
            <div class="user-profile">${profileInitial}</div>
            <div class="comment-content">
                <div>
                    <span class="username">${commentData.user}</span>
                    <span class="timestamp">${commentData.time}</span>
                </div>
                <div class="comment-text">${commentData.text}</div>
            </div>
        `;

        if (commentData.reply) {
            const replyDiv = document.createElement('div');
            replyDiv.className = 'comment comment-reply owner-reply';
            let replyProfile = commentData.reply.isOwner ? (commentData.reply.user === "HJ_Cotton" ? '🤍' : '🖤') : commentData.reply.profile;
            replyDiv.innerHTML = `
                 <div class="user-profile">${replyProfile}</div>
                 <div class="comment-content">
                    <div>
                        <span class="username">${commentData.reply.user}</span>
                        <span class="timestamp">${commentData.reply.time}</span>
                    </div>
                    <div class="comment-text">${commentData.reply.text}</div>
                 </div>
            `;
            const wrapper = document.createElement('div');
            wrapper.appendChild(commentDiv);
            wrapper.appendChild(replyDiv);
            return wrapper;
        }

        return commentDiv;
    }
    
    function likeVideo() {
        const likeBtn = document.getElementById('like-btn');
        if(likeBtn.style.backgroundColor === 'rgb(62, 166, 255)') { // 이미 좋아요 누른 상태
             likeCount--;
             likeBtn.style.backgroundColor = '';
        } else {
             likeCount++;
             likeBtn.style.backgroundColor = 'var(--yt-button-color)';
        }
        document.getElementById('like-count').textContent = likeCount.toLocaleString();
    }
    
    function toggleSubscribe() {
        const subBtn = document.getElementById('subscribe-btn');
        isSubscribed = !isSubscribed;
        if (isSubscribed) {
            subBtn.textContent = '구독중';
            subBtn.classList.add('subscribed');
        } else {
            subBtn.textContent = '구독';
            subBtn.classList.remove('subscribed');
        }
    }

    function addComment() {
        const input = document.getElementById('comment-input');
        if (input.value.trim() === '') return;

        const newCommentData = {
            user: "한우정",
            profile: "우",
            text: input.value,
            time: "방금 전"
        };
        const commentElement = createCommentElement(newCommentData);
        document.getElementById('comment-list').prepend(commentElement);
        
        const commentCountHeader = document.getElementById('comment-count-header');
        let currentCount = parseInt(commentCountHeader.textContent.match(/\d+/)[0]);
        commentCountHeader.textContent = `댓글 ${currentCount + 1}개`;

        input.value = '';
    }

    window.onload = () => {
        loadVideoList();
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');
        if (videoId) {
            goToVideo(parseInt(videoId));
        }
    };
</script>
